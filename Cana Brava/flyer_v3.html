<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer Cana Brava V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .story-container { background-image: url('bg_cana_brava_v3.png'); }
        .destination-badge { background: transparent; border: 2px solid white; color: white; }
        .price-box { background: rgba(0, 0, 0, 0.7); border-left: 4px solid #FFD700; }
        .price-label { color: #ccc; }
        .price-value { color: #FFD700; }
        .price-suffix { color: #aaa; }
        .info-card { background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .info-title { color: #ccc; }
        .info-desc { color: white; }
        .package-includes { background: rgba(255,215,0,0.1); border-top: 1px solid rgba(255,215,0,0.3); }
        .include-text { color: #ddd; }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="header">
            <div class="logo-container">
                <img src="../brand/logo_transparent.png" alt="Lidiane Turismo">
            </div>
            <div class="destination-badge">CANA BRAVA - ILHÉUS/BA</div>
        </div>

        <div class="content">
            <div class="price-box">
                <div class="price-label">A PARTIR DE</div>
                <div class="price-value">R$ [PREÇO]</div>
                <div class="price-suffix">por pessoa (pacote completo)</div>
            </div>

            <div class="info-card">
                <div class="info-row">
                    <div class="icon">🌴</div>
                    <div class="info-text">
                        <div class="info-title">Saída</div>
                        <div class="info-desc">[DATA DE SAÍDA]</div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="icon">🌴</div>
                    <div class="info-text">
                        <div class="info-title">Retorno</div>
                        <div class="info-desc">[DATA DE RETORNO]</div>
                    </div>
                </div>
                <div class="package-includes">
                    <div class="icon">🚌</div>
                    <div class="include-text">Pacote inclui: [TIPO DE TRANSPORTE]<br>+ Hospedagem no Resort All-inclusive</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
