<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer V9 - Modern Floating</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ddd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .story-container { width: 1080px; height: 1920px; background-image: url('bg_flyer_v6.png'); background-size: cover; background-position: center; position: relative; transform-origin: top center; transform: scale(0.4); border-radius: 40px; overflow: hidden; }
        .header { text-align: center; padding-top: 80px; position: relative; z-index: 10; }
        .logo { width: 380px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2)); }
        .floating-content { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; }
        .card { background: white; border-radius: 40px; padding: 60px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
        .card-orange { background: #FF7F50; color: white; border-radius: 40px; padding: 40px; box-shadow: 0 20px 40px rgba(255, 127, 80, 0.4); text-align: center; }
        .destination { font-family: 'Outfit', sans-serif; font-size: 75px; font-weight: 900; color: #008080; text-transform: uppercase; line-height: 1; margin-bottom: 20px; }
        .price { font-family: 'Outfit', sans-serif; font-size: 130px; font-weight: 900; line-height: 1; }
        .price-label { font-size: 32px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .list-info { text-align: left; margin-top: 40px; border-top: 2px solid #eee; padding-top: 40px; }
        .list-info p { font-size: 36px; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; }
        .list-info p::before { content: '•'; color: #FF7F50; font-size: 60px; line-height: 0; }
        .list-info strong { color: #008080; }
        @media (max-width: 1200px) { .story-container { transform: scale(0.3); } }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="header">
            <!-- Transparent Logo perfectly overlapping the sky -->
            <img src="../brand/logo_transparent.png" alt="Logo" class="logo">
        </div>

        <div class="floating-content">
            <div class="card">
                <div class="destination">Costa do Sauípe</div>
                <div class="list-info">
                    <p>Saída: <strong>06 Outubro 2026</strong></p>
                    <p>Retorno: <strong>11 Outubro 2026</strong></p>
                    <p>Transporte: <strong>Ônibus Leito</strong> (ida/volta)</p>
                    <p>Hospedagem: <strong>5 noites All-inclusive</strong></p>
                </div>
            </div>

            <div class="card-orange">
                <div class="price-label">Pacote Completo</div>
                <div class="price">R$ 3.300</div>
                <div style="font-size: 28px; margin-top: 10px;">por pessoa</div>
            </div>
        </div>
    </div>
</body>
</html>
