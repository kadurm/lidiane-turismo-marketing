<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer V4 - Night Luxury - Costa do Sauípe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .story-container { width: 1080px; height: 1920px; background-image: url('Fotos/real_v2.jpg'); background-size: cover; background-position: center; position: relative; overflow: hidden; transform-origin: top center; transform: scale(0.4); border-radius: 40px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%); z-index: 1; }
        .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 120px 80px; color: white; }
        .logo { width: 320px; margin: 0 auto; display: block; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .badge { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); padding: 15px 40px; border-radius: 50px; font-family: 'Outfit', sans-serif; font-size: 26px; text-transform: uppercase; letter-spacing: 3px; display: inline-block; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .bottom-section { text-align: center; }
        .price-label { font-size: 32px; color: #ccc; margin-bottom: 10px; font-weight: 300; }
        .price-value { font-family: 'Outfit', sans-serif; font-size: 130px; font-weight: 800; color: #fff; line-height: 1; text-shadow: 0 5px 20px rgba(0,0,0,0.5); margin-bottom: 40px; }
        .price-value span { font-size: 50px; color: #FF7F50; vertical-align: top; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; }
        .grid-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; backdrop-filter: blur(20px); }
        .grid-item i { font-size: 60px; color: #FF7F50; margin-bottom: 15px; }
        .grid-item p { font-size: 32px; font-weight: 600; margin-bottom: 5px; }
        .grid-item span { font-size: 24px; color: #aaa; }
        .includes { font-size: 36px; line-height: 1.5; color: #ddd; font-weight: 300; }
        .includes strong { color: white; font-weight: 700; }
        @media (max-width: 1200px) { .story-container { transform: scale(0.3); } }
        @media (max-width: 800px) { .story-container { transform: scale(0.25); } }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="overlay"></div>
        <div class="content">
            <div>
                <img src="../brand/logo.png" alt="Logo" class="logo">
                <div style="text-align: center; margin-top: 40px;">
                    <div class="badge">Costa do Sauípe</div>
                </div>
            </div>

            <div class="bottom-section">
                <div class="price-label">Pacote Completo A Partir De</div>
                <div class="price-value"><span>R$</span> 3.300</div>

                <div class="grid-info">
                    <div class="grid-item">
                        <i class="ph ph-bus"></i>
                        <p>06 Out</p>
                        <span>Saída</span>
                    </div>
                    <div class="grid-item">
                        <i class="ph ph-bus"></i>
                        <p>11 Out</p>
                        <span>Retorno</span>
                    </div>
                </div>

                <div class="includes">
                    Inclui: <strong>Ônibus Leito</strong> (ida/volta)<br> + <strong>5 Noites</strong> Resort All-Inclusive
                </div>
            </div>
        </div>
    </div>
</body>
</html>
