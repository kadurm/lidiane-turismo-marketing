<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer V6 - Action/Daytime - Costa do Sauípe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ddd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .story-container { width: 1080px; height: 1920px; background-image: url('bg_flyer_v6.png'); background-size: cover; background-position: center; position: relative; overflow: hidden; transform-origin: top center; transform: scale(0.4); border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 70%; background: linear-gradient(to top, #008080 0%, rgba(0,128,128,0.8) 50%, rgba(0,0,0,0) 100%); z-index: 1; }
        .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .top-tag { background: #FF7F50; color: white; display: inline-block; padding: 20px 50px; border-radius: 0 0 40px 0; font-size: 32px; font-weight: 900; text-transform: uppercase; }
        .logo-container { padding: 40px; text-align: right; }
        .logo { width: 280px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        .bottom-content { padding: 60px; color: white; text-align: center; }
        .title { font-family: 'Outfit', sans-serif; font-size: 90px; font-weight: 900; text-transform: uppercase; line-height: 0.9; margin-bottom: 20px; text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .dates { display: inline-flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 15px 40px; border-radius: 50px; font-size: 32px; font-weight: 700; margin-bottom: 50px; border: 2px solid rgba(255,255,255,0.4); }
        .dates i { color: #FF7F50; font-size: 40px; }
        .price-box { background: white; color: #008080; border-radius: 30px; padding: 50px; margin-bottom: 40px; transform: rotate(2deg); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .price-box p { font-size: 28px; font-weight: 700; text-transform: uppercase; color: #FF7F50; }
        .price-box h2 { font-family: 'Outfit', sans-serif; font-size: 110px; font-weight: 900; line-height: 1; margin: 10px 0; }
        .price-box span { font-size: 26px; font-weight: 700; color: #aaa; }
        .features { font-size: 34px; line-height: 1.4; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .features strong { color: #FF7F50; font-weight: 900; }
        @media (max-width: 1200px) { .story-container { transform: scale(0.3); } }
        @media (max-width: 800px) { .story-container { transform: scale(0.25); } }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="overlay"></div>

        <div class="content">
            <div class="top-section">
                <div class="top-tag" style="position: absolute; top: 0; left: 0;">Imperdível</div>
                <div class="logo-container" style="text-align: right; width: 100%;">
                    <img src="../brand/logo.png" alt="Logo" class="logo">
                </div>
            </div>
            <div class="bottom-content">
                <h1 class="title">Costa do<br>Sauípe</h1>
                
                <div class="dates">
                    <i class="ph ph-calendar-blank"></i> 06 a 11 Outubro 2026
                </div>

                <div class="price-box">
                    <p>Pacote Completo</p>
                    <h2>R$ 3.300</h2>
                    <span>por pessoa</span>
                </div>

                <div class="features">
                    Inclui: <strong>Ônibus Leito</strong> (Ida/Volta)<br>+ <strong>5 Noites</strong> Resort All-Inclusive
                </div>
            </div>
        </div>
    </div>
</body>
</html>
