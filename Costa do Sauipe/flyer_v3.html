<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer V3 - Vibrant - Costa do Sauípe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .story-container { width: 1080px; height: 1920px; background-image: url('bg_flyer_v3.png'); background-size: cover; background-position: center; position: relative; overflow: hidden; transform-origin: top center; transform: scale(0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 40px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 1; }
        .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; }
        .glass-panel { background: rgba(0, 102, 102, 0.7); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.3); border-radius: 50px; padding: 80px 60px; width: 100%; text-align: center; color: white; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .logo { width: 400px; margin-bottom: 30px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
        .title { font-family: 'Outfit', sans-serif; font-size: 65px; font-weight: 900; color: #FF7F50; text-transform: uppercase; margin-bottom: 50px; text-shadow: 0 4px 20px rgba(255,127,80,0.4); line-height: 1.1; }
        .title span { color: white; font-size: 50px; font-weight: 500; display: block; margin-bottom: 10px; }
        .price-badge { background: #FF7F50; color: white; display: inline-block; padding: 30px 60px; border-radius: 100px; transform: rotate(-3deg); margin-bottom: 60px; box-shadow: 0 15px 30px rgba(255,127,80,0.4); }
        .price-badge p { font-size: 30px; font-weight: 600; margin-bottom: 5px; }
        .price-badge h2 { font-family: 'Outfit', sans-serif; font-size: 90px; font-weight: 900; line-height: 1; }
        .details-list { text-align: left; background: rgba(0,0,0,0.3); padding: 50px; border-radius: 30px; margin-bottom: 0; }
        .detail-item { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
        .detail-item:last-child { margin-bottom: 0; }
        .detail-icon { font-size: 50px; color: #FF7F50; }
        .detail-text { font-size: 38px; font-weight: 600; }
        .detail-text strong { color: #FFDAB9; font-weight: 800; }
        @media (max-width: 1200px) { .story-container { transform: scale(0.3); } }
        @media (max-width: 800px) { .story-container { transform: scale(0.25); } }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="overlay"></div>
        <div class="content">
            <div class="glass-panel">
                <img src="../brand/logo.png" alt="Lidiane Turismo Logo" class="logo">
                
                <h1 class="title">
                    <span>Destino Premium</span>
                    Costa do Sauípe
                </h1>

                <div class="price-badge">
                    <p>Pacote Completo A Partir De</p>
                    <h2>R$ 3.300</h2>
                </div>

                <div class="details-list">
                    <div class="detail-item">
                        <i class="ph ph-calendar-check detail-icon"></i>
                        <div class="detail-text"><strong>06 a 11</strong> de Outubro 2026</div>
                    </div>
                    <div class="detail-item">
                        <i class="ph ph-bus detail-icon"></i>
                        <div class="detail-text"><strong>Ônibus Leito</strong> (Ida e Volta)</div>
                    </div>
                    <div class="detail-item">
                        <i class="ph ph-martini detail-icon"></i>
                        <div class="detail-text"><strong>5 Noites</strong> Resort All-Inclusive</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
