<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo Animação - Costa do Sauípe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .video-container { 
            position: relative;
            width: 100%;
            max-width: 1080px; 
            height: 100%;
            max-height: 1920px;
            aspect-ratio: 9/16; 
            overflow: hidden; 
            background: #000;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg_flyer_v6.png');
            background-size: cover;
            background-position: center;
            /* Ken Burns Effect */
            animation: kenBurns 10s linear forwards;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .logo {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            width: 40%; max-width: 300px; z-index: 10;
            opacity: 0;
            animation: fadeIn 1s 0.5s forwards;
        }

        .text-scene {
            position: absolute; width: 90%; left: 5%; text-align: center; color: white; z-index: 5;
            opacity: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            top: 50%; transform: translateY(-50%);
        }

        .text-scene h1 { font-family: 'Outfit', sans-serif; font-size: 8vh; font-weight: 900; line-height: 1; text-transform: uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .text-scene p { font-size: 3vh; font-weight: 600; margin-top: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* SCENE TIMINGS (Total 10 seconds) */
        /* Scene 1: 0s to 3.5s */
        .scene-1 { animation: sceneInOut 3.5s 0s forwards; }
        
        /* Scene 2: 3.5s to 7s */
        .scene-2 { animation: sceneInOut 3.5s 3.5s forwards; }
        
        /* Scene 3: 7s to 10s */
        .scene-3 { animation: sceneInKeep 3s 7s forwards; }

        .price-badge {
            background: #FF7F50; color: white; padding: 15px 30px; border-radius: 50px; font-size: 4vh; font-weight: 900; margin-top: 20px; box-shadow: 0 10px 30px rgba(255,127,80,0.4);
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) translateY(-2%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes sceneInOut {
            0% { opacity: 0; transform: translateY(-45%) scale(0.9); filter: blur(5px); }
            15% { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0); }
            85% { opacity: 1; transform: translateY(-50%) scale(1.05); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-55%) scale(1.1); filter: blur(5px); }
        }

        @keyframes sceneInKeep {
            0% { opacity: 0; transform: translateY(-45%) scale(0.9); filter: blur(5px); }
            20% { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0); }
            100% { opacity: 1; transform: translateY(-50%) scale(1.05); filter: blur(0); }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="bg-layer"></div>
        <div class="overlay"></div>
        
        <img src="../brand/logo_transparent.png" class="logo" alt="Lidiane Turismo">

        <!-- Cena 1 -->
        <div class="text-scene scene-1">
            <h1>O Paraíso<br>Te Chama</h1>
            <p>Águas cristalinas e natureza intocada.</p>
        </div>

        <!-- Cena 2 -->
        <div class="text-scene scene-2">
            <h1 style="color: #FFD700;">All-Inclusive</h1>
            <p>Comida, bebida e diversão ilimitadas.</p>
        </div>

        <!-- Cena 3 -->
        <div class="text-scene scene-3">
            <h1>Costa do Sauípe</h1>
            <p>06 a 11 Outubro • Ônibus Leito</p>
            <div class="price-badge">A partir de R$ 3.300</div>
        </div>
    </div>
</body>
</html>
