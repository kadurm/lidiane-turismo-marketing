<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer V5 - Sunset Romantic - Costa do Sauípe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .story-container { width: 1080px; height: 1920px; background-image: url('bg_flyer_v5.png'); background-size: cover; background-position: center; position: relative; overflow: hidden; transform-origin: top center; transform: scale(0.4); border-radius: 40px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(139,0,0,0.9) 0%, rgba(255,140,0,0.3) 50%, rgba(0,0,0,0.6) 100%); z-index: 1; mix-blend-mode: multiply; }
        .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 100px; color: #fff; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 250px; }
        .date-box { text-align: right; }
        .date-box p { font-size: 28px; font-family: 'Outfit', sans-serif; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; }
        .date-box h3 { font-size: 40px; font-weight: 900; color: #FFD700; }
        .middle { flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .main-title { font-family: 'Outfit', sans-serif; font-size: 110px; font-weight: 900; line-height: 0.9; text-transform: uppercase; text-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 20px; }
        .subtitle { font-size: 40px; font-weight: 300; letter-spacing: 5px; }
        .bottom-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.3); border-radius: 40px; padding: 60px; text-align: center; }
        .price-text { font-size: 32px; margin-bottom: 15px; }
        .price-number { font-family: 'Outfit', sans-serif; font-size: 120px; font-weight: 900; color: #FFF; text-shadow: 0 4px 15px rgba(255, 69, 0, 0.5); line-height: 1; margin-bottom: 30px; }
        .divider { width: 100px; height: 3px; background: #FFD700; margin: 0 auto 30px; }
        .includes { font-size: 34px; line-height: 1.5; }
        .includes span { color: #FFD700; font-weight: 700; }
        @media (max-width: 1200px) { .story-container { transform: scale(0.3); } }
        @media (max-width: 800px) { .story-container { transform: scale(0.25); } }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="overlay"></div>
        <div class="content">
            <div class="header">
                <img src="../brand/logo.png" alt="Logo" class="logo">
                <div class="date-box">
                    <p>Outubro</p>
                    <h3>06 a 11</h3>
                </div>
            </div>

            <div class="middle">
                <div>
                    <h1 class="main-title">Costa do<br>Sauípe</h1>
                    <p class="subtitle">EXPERIÊNCIA PREMIUM</p>
                </div>
            </div>

            <div class="bottom-card">
                <p class="price-text">A partir de</p>
                <div class="price-number">R$ 3.300</div>
                <div class="divider"></div>
                <div class="includes">
                    <span>Ônibus Leito</span> (ida e volta) <br>+ <span>5 noites</span> Resort All-Inclusive
                </div>
            </div>
        </div>
    </div>
</body>
</html>
